spring:
  application:
    name: ai-soil-health-assessment


  config:
    import: optional:file:secrets.env[properties]

  jta:
    enabled: true

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: 5000

sendbridge:
  api:
    token: ${SENDBRIDGE_API_TOKEN}

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000